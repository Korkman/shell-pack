# shell-pack tmux.conf

# supported minimum tmux version: 2.8 (Debian Buster)

# make it easy to reload the config (CTRL+r)
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
#bind r source-file ~/.tmux.conf

# turn 3.0a into 300, 2.4 into 204
# the following sets the variable __sp_tmux_ver by running
# - a shell that tells tmux to set __sp_tmux_ver
# - to a math expansion
# - executing a nested shell that creates a formula (major * 100 + minor) from tmux -V
# - note how this this creates "305" for version 3.5 and "310" for version 3.10
run-shell 'tmux set-environment __sp_tmux_ver "$(( $(tmux -V | sed s/[^0-9\\.]//g\;s/\\./\*100\+/) ))"'
#display "#{__sp_tmux_ver}"

# then compare like this
#if-shell -b '[ $__sp_tmux_ver -gt 200 ]' "\
#	display 'great'; \
#	display 'great!'; \
#" "\
#	display 'not so great'; \
#	display 'not so great!'; \
#"

# Intuitive window splitting
bind | split-window -h -c "#{pane_current_path}" # left/right, default: %
bind - split-window -v -c "#{pane_current_path}" # top/bottom, default: "

# add current path to new windows
bind c new-window -c "#{pane_current_path}"

# Large history
set -g history-limit 50000

# Mouse support (tmux >= 2.1)
set -g mouse on

# do pass clipboard OSC-52 codes so the client clipboard is updated
set -g set-clipboard on

# Display messages longer
set -g display-time 4000

# copy and paste

# vi keys are best (most intuitive) for copy and paste
set -g mode-keys vi

# enter copy mode, tmux default: [
bind PageUp copy-mode \; display-message 'Entered copy-mode, use PgUp/PgDn to scroll, press q or enter to leave'
bind up copy-mode \; display-message 'Entered copy-mode, use PgUp/PgDn to scroll, press q or enter to leave'
bind Escape copy-mode \; display-message 'Entered copy-mode, use PgUp/PgDn to scroll, press q or enter to leave'
# add C-a v for paste (unmodified)
bind v paste-buffer -r

# c-a arrows left/right: move window in (use . )
# tmux 3.0 "corrected" behavior, else older tmux
if-shell -b '[ $__sp_tmux_ver -ge 300 ]' "\
	bind Left swap-window -d -t -1; \
	bind Right swap-window -d -t +1; \
" "\
	bind Left swap-window -t -1; \
	bind Right swap-window -t +1; \
"

# broadcast input to all panes
if-shell -b '[ $__sp_tmux_ver -ge 305 ]' "\
bind B set-window-option synchronize-panes \\\
\; display-message \"synchronize-panes is now #{?pane_synchronized,on,off}\" \\\
\; setw pane-border-style '#{?pane_synchronized,bg=colour226#,fg=colour16,none}' \\\
\; setw pane-active-border-style '#{?pane_synchronized,bg=colour226#,fg=colour16,fg=colour2}' \\\
\; setw pane-border-format '#{pane_index} #T' \\\
\; setw pane-border-status #{?pane_synchronized,top,off} \
" "\
bind B set-window-option synchronize-panes \\\
\; display-message \"synchronize-panes is now #{?pane_synchronized,on,off}\" \\\
\; setw pane-border-style bg=colour226,fg=colour16 \\\
\; setw pane-active-border-style bg=colour226,fg=colour16 \\\
\; setw pane-border-format '#{pane_index} #T' \\\
\; setw pane-border-status top \
"


# set very low escape time (ms)
# feels responsive, should not cause problems in our networks
set -g escape-time 50

# color support:
# - try "screen" if "tmux" is not in infocmp
# - add -256color if terminal supports it
# - for certain programs, like mc, 'tmux-256color' will be replaced with 'screen-256color' by aliases
if-shell '[ $(tput colors) -lt 256 ]' 'set -g default-terminal screen'
if-shell '[ $(tput colors) -ge 256 ]' 'set -g default-terminal screen-256color'
if-shell '[ $(tput colors) -lt 256 ] && infocmp tmux > /dev/null 2>&1'          'set -g default-terminal tmux'
if-shell '[ $(tput colors) -ge 256 ] && infocmp tmux-256color > /dev/null 2>&1' 'set -g default-terminal tmux-256color'

# automatic rename of window name to active pane title
set-window-option -g automatic-rename on
set-window-option -g automatic-rename-format '#T'

# gnu screen compatibility
set -g prefix C-a           # ctrl-a command prefix: screen compat
set -g prefix2 C-b          # ctrl-b command prefix: tmux default
bind bspace previous-window # prev window, tmux default: p
bind space next-window      # next window, tmux default: n
bind C-space next-window    # catch accidential ctrl-key press
bind S split-window -v      # split vertical, tmux default: "
bind C-a last-window        # last window toggle, tmux default: l
bind a send-prefix          # jump to beginning of line in bash, tmux default: different prefix C-b
bind Q break-pane           # make split region a dedicated window, tmux default: !
# kill current pane, tmux default: x
bind k confirm-before -p "Kill pane? (y/N)" kill-pane
# tab to move to next pane, tmux default: o
bind tab select-pane -t:.+
# kill all windows, screen-like + Shift-K
bind K confirm-before -p "Kill all windows and exit? (y/N)" kill-session
bind '\' confirm-before -p "Kill all windows and exit? (y/N)" kill-session    # ide-helper: '
# show window number and name
bind N display-message "This is window #I (#W). C-a . changes index, C-a A changes name."
# rename window, tmux default: ,
# added: disable renaming to make new name permanent
bind A command-prompt -I "#W" "rename-window '%%'" \; set-window-option allow-rename off

# Pass thru window title set by shell
set -g set-titles on
set -g set-titles-string '#T'

# Allow shell to rename window
set -g allow-rename on

# make ctrl-arrow work in mc
# make shift-arrow work in mc
set-window-option -g xterm-keys on

# make client-side scrollbuffers work
# adding xterm*:smcup@:rmcup@,rxvt*:smcup@:rmcup@,xs:smcup@:rmcup@ to default
set -g terminal-overrides 'xterm*:smcup@:rmcup@,rxvt*:smcup@:rmcup@,xs:smcup@:rmcup@,*88col*:colors=88,*256col*:colors=256,xterm*:XT:Ms=\E]52;%p1%s;%p2%s\007:Cc=\E]12;%p1%s\007:Cr=\E]112\007:Cs=\E[%p1%d q:Csr=\E[2 q,screen*:XT'

# Status line colors
set -g status on
# blue color scheme for stage systems
set -g status-style bg=colour26,fg=brightwhite
set-window-option -g window-status-current-style bg=brightwhite,fg=blue
set -g message-style fg=colour16,bg=colour226,bold

# show host, session on the left
set -g status-left-length 40
set -g status-left '#{?#{==:#{client_key_table},prefix},#[bg=colour226 fg=colour16]PRFX ,#{?#{==:#{pane_mode},copy-mode},#[bg=colour226 fg=colour16]COPY ,#{?#{pane_synchronized},#[bg=colour226 fg=colour16]SYNC ,#[reverse]NORM #[default]}}}#[default] #{=20:host_short}/#S '

# show load, status indicator, better clock on the right
# @clock_details: set to 1 to include the year in the clock; click the right status bar corner to toggle
set -g @clock_details 0
set -g status-right-length 40
set -g status-right ' #(([ -f /proc/loadavg ] && cut -d " " -f -3 /proc/loadavg) || (sysctl vm.loadavg | sed "s/.*{ //;s/ }.*//") || "") #[reverse] #{?#{@clock_details},%H:%M:%S %Y-%m-%d,%H:%M %m-%d}'


# Refresh interval for the status, default: 15
set -Fg @status_interval 15
set -Fg status-interval "#{@status_interval}"

# center window list
# NOTE: absolute-centre quickly cuts away information
set -g status-justify centre

# start windows at 1 instead of 0 (0 being far away from ctrl-a on keyboard)
set -g base-index 1
setw -g pane-base-index 1
bind 0 select-window -t 10
# transition: if window 0 exists, bind that to zero instead
run-shell -b "tmux list-windows -F '##{window_index}' | grep -x 0 > /dev/null && tmux bind 0 select-window -t 0 || exit 0"

# prompt-scrollback with Ctrl-Up/-Dn and Alt-Up/-Dn in copy-modes, and to quick-enter copy mode
# for older tmux versions we search for a utf8 whitespace character
if-shell -b '[ $__sp_tmux_ver -ge 304 ]' "\
	bind -T copy-mode-vi y send-keys -X previous-prompt; \
	bind -T copy-mode-vi z send-keys -X previous-prompt; \
	bind -T copy-mode-vi x send-keys -X next-prompt; \
	bind -T copy-mode-vi M-Up send-keys -X previous-prompt; \
	bind -T copy-mode-vi M-Down send-keys -X next-prompt; \
	bind -T copy-mode-vi C-Up send-keys -X previous-prompt; \
	bind -T copy-mode-vi C-Down send-keys -X next-prompt; \
	bind -T copy-mode y send-keys -X previous-prompt; \
	bind -T copy-mode z send-keys -X previous-prompt; \
	bind -T copy-mode x send-keys -X next-prompt; \
	bind -T copy-mode M-Up send-keys -X previous-prompt; \
	bind -T copy-mode M-Down send-keys -X next-prompt; \
	bind -T copy-mode C-Up send-keys -X previous-prompt; \
	bind -T copy-mode C-Down send-keys -X next-prompt; \
	bind M-Up copy-mode\\; send-keys -X previous-prompt; \
	bind M-Down copy-mode\\; send-keys -X next-prompt; \
" "\
	bind -T copy-mode-vi y send-keys -X start-of-line \\; send-keys -X search-backward " " \\; send-keys -X start-of-line; \
	bind -T copy-mode-vi z send-keys -X start-of-line \\; send-keys -X search-backward " " \\; send-keys -X start-of-line; \
	bind -T copy-mode-vi x send-keys -X end-of-line \\; send-keys -X search-forward " " \\; send-keys -X start-of-line; \
	bind -T copy-mode-vi M-Up send-keys -X start-of-line \\; send-keys -X search-backward " " \\; send-keys -X start-of-line; \
	bind -T copy-mode-vi M-Down send-keys -X end-of-line \\; send-keys -X search-forward " " \\; send-keys -X start-of-line; \
	bind -T copy-mode-vi C-Up send-keys -X start-of-line \\; send-keys -X search-backward " " \\; send-keys -X start-of-line; \
	bind -T copy-mode-vi C-Down send-keys -X end-of-line \\; send-keys -X search-forward " " \\; send-keys -X start-of-line; \
	bind -T copy-mode y send-keys -X start-of-line \\; send-keys -X search-backward " " \\; send-keys -X start-of-line; \
	bind -T copy-mode z send-keys -X start-of-line \\; send-keys -X search-backward " " \\; send-keys -X start-of-line; \
	bind -T copy-mode x send-keys -X end-of-line \\; send-keys -X search-forward " " \\; send-keys -X start-of-line; \
	bind -T copy-mode M-Up send-keys -X start-of-line \\; send-keys -X search-backward " " \\; send-keys -X start-of-line; \
	bind -T copy-mode M-Down send-keys -X end-of-line \\; send-keys -X search-forward " " \\; send-keys -X start-of-line; \
	bind -T copy-mode C-Up send-keys -X start-of-line \\; send-keys -X search-backward " " \\; send-keys -X start-of-line; \
	bind -T copy-mode C-Down send-keys -X end-of-line \\; send-keys -X search-forward " " \\; send-keys -X start-of-line; \
	bind M-Up copy-mode\\; send-keys -X start-of-line \\; send-keys -X search-backward " " \\; send-keys -X start-of-line; \
	bind M-Down copy-mode\\; send-keys -X end-of-line \\; send-keys -X search-forward " " \\; send-keys -X start-of-line; \
\
"
# NOTE: about the legacy tmux support: all attempts to search for zero-width utf8 chars ended in tmux locking up at 100% cpu.
# so instead we use a part of the prompt we have anyways, which isn't great but not terrible either.

# have ctrl-d, f10 and esc exit copy mode
bind -T copy-mode-vi C-d send-keys -X cancel
bind -T copy-mode C-d send-keys -X cancel
bind -T copy-mode-vi f10 send-keys -X cancel
bind -T copy-mode f10 send-keys -X cancel
bind -T copy-mode-vi escape send-keys -X cancel
bind -T copy-mode escape send-keys -X cancel

# one-time activity monitoring
set -g activity-action any
set-hook -g alert-activity "display \"Activity detected on window #{hook_window}, monitor disabled\" ; set -w monitor-activity off"
bind M   set -w monitor-activity on \; display "Monitoring window for activity ONCE"

# one-time silence monitoring
set -g silence-action any
set-hook -g alert-silence "display \"Silence detected on window #{hook_window}, monitor disabled\" ; set -w monitor-silence 0"
bind _   set -w monitor-silence 30 \; display "Monitoring window for silence ONCE"

# scroll to top / end of buffer with alt-pgup/-pgdn
bind M-PageUp copy-mode \; send-keys -X history-top
bind M-PageDown copy-mode \; send-keys -X history-bottom
bind -T copy-mode M-PageUp send-keys -X history-top
bind -T copy-mode M-PageDown send-keys -X history-bottom
bind -T copy-mode-vi M-PageUp send-keys -X history-top
bind -T copy-mode-vi M-PageDown send-keys -X history-bottom
bind -T copy-mode MouseDown1Pane select-pane \; send-keys -X clear-selection
bind -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection

# do not exit copy-mode when selecting with mouse
# user often scrolls way up to a specific position and may want to copy multiple strings
# without having to scroll again. also, keep the selection if possible to mark what was copied.
if-shell -b '[ $__sp_tmux_ver -ge 300 ]' "\
	bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear; \
	bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-no-clear; \
	bind -T copy-mode DoubleClick1Pane select-pane \\\; send-keys -X select-word \\\; send-keys -X copy-selection-no-clear; \
	bind -T copy-mode TripleClick1Pane select-pane \\\; send-keys -X select-line \\\; send-keys -X copy-selection-no-clear; \
	bind -T copy-mode-vi DoubleClick1Pane select-pane \\\; send-keys -X select-word \\\; send-keys -X copy-selection-no-clear; \
	bind -T copy-mode-vi TripleClick1Pane select-pane \\\; send-keys -X select-line \\\; send-keys -X copy-selection-no-clear; \
	bind -T copy-mode c send-keys -X copy-selection-no-clear\\\; display \"Selection copied\"; \
	bind -T copy-mode-vi c send-keys -X copy-selection-no-clear\\\; display \"Selection copied\"; \
" "\
	bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection; \
	bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection; \
	bind -T copy-mode DoubleClick1Pane select-pane \\\; send-keys -X select-word \\\; send-keys -X copy-selection; \
	bind -T copy-mode TripleClick1Pane select-pane \\\; send-keys -X select-line \\\; send-keys -X copy-selection; \
	bind -T copy-mode-vi DoubleClick1Pane select-pane \\\; send-keys -X select-word \\\; send-keys -X copy-selection; \
	bind -T copy-mode-vi TripleClick1Pane select-pane \\\; send-keys -X select-line \\\; send-keys -X copy-selection; \
	bind -T copy-mode c send-keys -X copy-selection\\\; display \"Selection copied\"; \
	bind -T copy-mode-vi c send-keys -X copy-selection\\\; display \"Selection copied\"; \
\
"

# various mouse events:
# left status bar corner: click to toggle prefix mode
# left status bar corner: double-click to show session tree chooser
# left status bar corner: prefix + wheelup/-down move status bar up / down
# window name: double-click to create new neighbor window
# window name: middle-click to close with confirm
# window name: prefix + middle-click to close without confirm, stay prefixed
# right status bar corner: hold left mouse button down for precise time
# right status bar corner: double-click to create dool + htop windows
# empty status bar area: double-click to create new window
# whole status bar area: wheelup/-down on scroll through windows just like window names
# prefix + many middle-click events keep prefix active to forgive misclicks
if-shell -b '[ $__sp_tmux_ver -ge 209 ]' "\
	bind -n DoubleClick1StatusLeft if-shell -F '#{==:#{pane_mode},tree-mode}' 'send-keys Escape' 'choose-tree -Zw'; \
	bind -n DoubleClick1Status select-window -t \"{mouse}\" \\\; new-window -a -c \"#{pane_current_path}\"; \
	bind -n MouseDown1StatusLeft switch-client -T prefix; \
	bind -T prefix MouseUp1StatusLeft switch-client -T prefix; \
	bind -T prefix MouseDown1StatusLeft switch-client -T root; \
	bind -n DoubleClick1StatusRight if-shell \"tmux list-windows -F '##{window_name}' | grep -qx 'ddool'\" \"\" \"new-window -a -t '{end}' -n ddool 'command -v fishcall > /dev/null && fishcall ddool || dool' \; split-window 'command -v fishcall > /dev/null && fishcall ddool 60 || dool 60'\"\\\; if-shell \"tmux list-windows -F '##{window_name}' | grep -qx 'htop'\" \"\" \"new-window -a -t '{end}' -n htop htop\" \\\; select-window -t \"htop\"; \
	bind -T prefix WheelUpStatusLeft set -s status-position top \\\; set -s status-justify left; \
	bind -T prefix WheelDownStatusLeft set -s status-position bottom \\\; set -sF status-justify centre; \
	bind -n DoubleClick1StatusDefault new-window -c \"#{pane_current_path}\"; \
	bind -n WheelUpStatusDefault previous-window; \
	bind -n WheelDownStatusDefault next-window; \
	bind -n WheelUpStatusLeft previous-window; \
	bind -n WheelDownStatusLeft next-window; \
	bind -n WheelUpStatusRight previous-window; \
	bind -n WheelDownStatusRight next-window; \
	bind -n MouseDown1StatusRight set -g @clock_details 1 \\\; set -Fg status-interval 1;  \
	bind -n MouseUp1StatusRight set -g @clock_details 0 \\\; set -Fg status-interval \"#{@status_interval}\"; \
	bind -n MouseDown2Status select-window -t \"{mouse}\" \\\; confirm-before -p \"kill-window \#W? (y/n)\" \"kill-window\"; \
"

# moving this to minimum 303 as closing the last tab crashed in podman test-drive debian bullseye
if-shell -b '[ $__sp_tmux_ver -ge 303 ]' "\
	bind -T prefix MouseDown2Status kill-window -t \"{mouse}\" \\\; switch-client -T prefix; \
	bind -T prefix MouseUp2Status \\\; switch-client -T prefix; \
	bind -T prefix DoubleClick2Status \\\; switch-client -T prefix; \
	bind -T prefix TripleClick2Status \\\; switch-client -T prefix; \
	bind -T prefix MouseDrag2Status \\\; switch-client -T prefix; \
	bind -T prefix MouseDragEnd2Status \\\; switch-client -T prefix; \
	bind -T prefix MouseUp2StatusDefault \\\; switch-client -T prefix; \
	bind -T prefix MouseDown2StatusDefault \\\; switch-client -T prefix; \
	bind -T prefix DoubleClick2StatusDefault \\\; switch-client -T prefix; \
	bind -T prefix TripleClick2StatusDefault \\\; switch-client -T prefix; \
	bind -T prefix MouseDrag2StatusDefault \\\; switch-client -T prefix; \
	bind -T prefix MouseDragEnd2StatusDefault \\\; switch-client -T prefix; \
	bind -T prefix SecondClick2Status \\\; switch-client -T prefix; \
	bind -T prefix SecondClick2StatusDefault \\\; switch-client -T prefix; \
"

# show cheat --tmux
bind f1 run-shell 'fish --interactive -c "cheat --tmux"'
bind h run-shell 'fish --interactive -c "cheat --tmux"'

# enable focus reporting
# restricted to higher tmux versions as mcedit failed to render when opening files in Debian Bookworm
# (approximate, no associated bug report found in a quick search)
if-shell -b '[ $__sp_tmux_ver -ge 305 ]' 'set -g focus-events on' 'set -g focus-events off'

# move window to another session, create it if necessary, and switch to it
bind M-w command-prompt \
-p "Move window to (new) session:" \
"if-shell \"tmux has-session -t '%1'\" \"display 'Existing session %1'\" \"new-session -d -s '%1' 'sleep 2' ; move-window -s '%1:1' -t '%1:9' ; display 'New session %1' \" ; \
move-window -t '%1:' ; \
switch-client -t '%1' \
"

# move window to another session with a session picker
bind W display "Move window to session ..." \; choose-tree -ZNs "move-window -t '%1' ; switch-client -t '%1'"

# restored defaults (2026-05-16)
bind-key    -T prefix       z                         resize-pane -Z
bind-key    -T prefix       x                         confirm-before -p "kill-pane #P? (y/n)" kill-pane
# end restored defaults
